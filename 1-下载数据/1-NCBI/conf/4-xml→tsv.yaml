# =====================================================================
# 4-xml→tsv — 配置文件
# 功能：将目录下所有 XML 文件批量提取为单一 TSV 文件
# 用法：由 pipe/4-xml→tsv.sh 读取，通过 source script/load_config.sh 加载
# =====================================================================

project:
  base_dir: "/mnt/f/onedrive/文档（科研）/脚本/Download/9-My-Toolskit/1-下载数据/1-NCBI"              # 项目根目录（绝对路径）

# --------------------------------------------------------------------- #
# 目录与文件路径                                                         #
# --------------------------------------------------------------------- #
paths:
  python_dir: "python"                    # Python 模块目录（相对于 base_dir）
  xml_dir: "/mnt/d/5-NCBI-Reference/4-MTB/meta/xml"                     # 输入：XML 文件所在目录（相对 base_dir 或绝对路径均可）
  output_dir: "/mnt/d/5-NCBI-Reference/4-MTB/meta"                      # 输出根目录
  output_tsv: "/mnt/d/5-NCBI-Reference/4-MTB/meta/result.tsv"  # 输出：TSV 文件路径（支持绝对路径）

# --------------------------------------------------------------------- #
# 工具路径                                                               #
# --------------------------------------------------------------------- #
tools:
  python_bin: "python3"                   # Python 解释器路径或命令

# --------------------------------------------------------------------- #
# 运行参数                                                               #
# --------------------------------------------------------------------- #
runtime:
  jobs: 8                                 # 并行进程数（建议不超过 CPU 核心数）
  verbose: false                          # 是否开启 DEBUG 日志（true/false）
